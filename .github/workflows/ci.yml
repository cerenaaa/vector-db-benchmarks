name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy pytest
      - run: python -c "from backends.brute_force import BruteForceIndex; import numpy as np; rng=np.random.default_rng(0); v=rng.standard_normal((100,32)).astype('float32'); q=rng.standard_normal(32).astype('float32'); idx=BruteForceIndex(); idx.build(v); ids,sc=idx.search(q,5); assert len(ids)==5; print('brute force OK')"
      - run: python run_benchmark.py --n_vectors 1000 --n_queries 100 --dim 32
